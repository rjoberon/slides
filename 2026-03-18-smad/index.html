<em class="tonedown">([Schöch et al. 2020](https://doi.org/10.17175/2020_006))</em>

- transform texts such that original can not be reconstructed
  - document-term matrices
  - n-grams <em class="tonedown">(e.g., [Google Books n-grams](http://commondatastorage.googleapis.com/books/syntactic-ngrams/index.html))</em>

- transformed texts useful for (some) research
  - e.g., topic modelling, authorship classification

→ [Text+ working group](https://text-plus.org/en/themen-dokumentation/atf/)

Note:
- idea: share information *about* texts without sharing the texts
- animation shows topic detection on documents for which only a
  document-term matrix is available

## n-Grams

> This is a simple sentence.

- 1-grams: This, is, a, simple, sentence
- 2-grams: This is, is a, a simple, simple sentence
- 3-grams: This is a, is a simple, a simple sentence

<div class="fragment">

<br/>

→ prior datasets, for example, [Herdağdelen 2013](https://doi.org/10.1007/s10579-013-9227-2)

</div>


Note:
- consecutive sequence of n tokens
- here: tokens = words, but could also be characters
- 🖱️  prior dataset based on 74,579,965 tweets from 2010 only
  - ... and no longer available

## Filtering Tweets

| count              | type                      |
| -------------:     | -----------               |
| 14,160,083,429     | valid                     |
| -9,260,435,685     | non-English               |
| -1,182,713,840     | deleted                   |
| -1,606,843,572     | retweets                  |
| -2,718,439         | duplicates                |
| **=2,107,371,893** | **unique English tweets** |

Notes:
- **invalid**: e.g., incomplete due to disconnect, empty tweets (no text)
- **English**: FastText
- **deleted**: deletion information contained in our dataset
- **retweets**: avoid distortions/spam (but could be interesting as an extension)
- **duplicates**: due to redundant collection

--

## Processing

- removed URLs and @mentions
- tokenized with twokenize <em class="tonedown">([Ritter et al. 2011](https://aclanthology.org/D11-1141/))</em>
- optional: normalization to lower case
- extracted 1-, 2-, 3-grams

```text
what’s
don’t
&
06/12/2023
€3.50
#OMG
@user
30°C
;D
>.<
123
45.67
1,000
🔥
```

<!-- .element class="fragment" style="float:right; width:10%;" data-fragment-index="3" -->


> what’s don’t &amp; 06/12/2023 €3.50 #OMG @user 30°C ;D >.< 123 45.67 1,000 🔥

<!-- .element class="fragment" style="width: 60%;" data-fragment-index="2" -->


Note:
- URLs/@mentions: privacy/personal rights; URLs: not our focus
- tokenization: separating individual tokens
  - typically words, numbers etc. but tweets very rich:
	- 🖱️  idiosyncrasies typical of social media, such as creative
	  orthography, meta-information (e.g., hashtags, mentions), and
	  emoticons
  - simple / standard tokenizer not sufficient
	- e.g., separates emoticons or currency symbols (or units like °C)
	- thus: **twokenize** 🖱️  *(works like a charm)*
- as can be seen: **we keep punctuation**

--
## Dataset

- two parts: *original case* and *lower case*
  - each part: 11 TAR files, one for each year (2013-2023)
	- each TAR: up to 12 gzip-compressed TSV files, one for each month
- → overall: 125 TSV files
  - each line represents an n-gram with the following columns: <!-- .element class="fragment" -->
	- `ngram_type`: 1, 2, or 3
	- `count`: frequency <em class="tonedown">(i.e., number of appearances per month)</em>
	- `ngram`: the n-gram itself

## Limitations

- gaps & errors
- timeframe
- post-collection deletions
- sampling <em class="tonedown">([Morstatter et al. 2013](https://doi.org/10.1609/icwsm.v7i1.14401))


Note:
- gaps: outages (crawler, Twitter API), API v1 shutdown (→ 2022-12 missing)
- timeframe: 01/2013 and 06/2023 incomplete, 07/2023++ missing → years incomplete
- sampling:
  - started from 1%, then filtered → not 1% of English tweets

## Summary

- monthly 1-, 2-, 3-grams based on more than 2 billion English tweets
  - 01/2013 – 06/2023
  - including frequency information
- publicly available at doi:[10.5281/zenodo.15736201](https://doi.org/10.5281/zenodo.15736201)

- effortless re-use
