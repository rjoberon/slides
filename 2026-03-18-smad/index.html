| -9,260,435,685     | non-English               |
| -1,182,713,840     | deleted                   |
| -1,606,843,572     | retweets                  |
| -2,718,439         | duplicates                |

Notes:
- deleted: deletion information contained in our dataset
- duplicates: due to redundant collection

## Tokenization

All URLs and @mentions of user names were removed from the textual
content. To account for idiosyncrasies typical of social media, such
as creative orthography, meta-information (e.g., hashtags, mentions),
and emoticons, the text was tokenised using twokenize

[Ritter et al. 2011](https://aclanthology.org/D11-1141/)

## Result

- 2 parts: case of letters preserved vs. case normalized to lower case
- each part: 11 TAR files, one for each year (2013-2023)
- each TAR: up to 12 gzip-compressed TSV files (one for each month)

→ overall: 125 TSV files

each line in a TSV file represents an n-gram using the following
columns:
- `ngram_type`: 1, 2, or 3
- `count`: frequency, that is, number of times it appears in that
  month
- `ngram`: the n-gram itself

## Limitations

- gaps & errors
- timeframe
- post-collection deletions
- sampling <em class="tonedown">([Morstatter et al. 2013](https://doi.org/10.1609/icwsm.v7i1.14401))

Note:
- gaps: outages (crawler, Twitter API)
- timeframe: first & last month and thus years incomplete
- sampling:
  - started from 1%, then filtered → not 1% of English tweets

  → [Arnold and Jäschke 2025](https://doi.org/10.1007/978-3-032-06136-2_13)

  → talk [Sharing Is Caring: Wie das Teilen von Annotationen urheberrechtlich geschützter Texte gelingen kann](https://bibliocon2026.abstractserver.com/program/#/details/presentations/248) @ [BiblioCon 2026](https://2026.bibliocon.de/)
