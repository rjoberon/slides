dataset:

## Filtering

3,716,933,904 English tweets, we removed 1,606,843,572 retweets and
2,718,439 duplicates (due to redundant collection), resulting in
2,107,371,893 unique tweets.

- what about deleted tweets?

--
## Tokenization

All URLs and @mentions of user names were removed from the textual
content. To account for idiosyncrasies typical of social media, such
as creative orthography, meta-information (e.g., hashtags, mentions),
and emoticons, the text was tokenised using twokenize


<small>Alan Ritter et al. “Named Entity Recognition in Tweets: An
Experimental Study.” In: <em>Proceedings of the 2011 Conference on
Empirical Methods in Natural Language Processing</em>. Edinburgh,
Scotland, UK.: Association for Computational Linguistics, July 2011,
pp. 1524–1534. url:[https://aclanthology.org/D11-1141/](https://aclanthology.org/D11-1141/).</small>

## Result
- 2 parts: case of letters preserved vs. case normalized to lower case
- each part: 11 TAR files, one for each year (2013-2023)
- each TAR: up to 12 gzip-compressed TSV files (one for each month)

→ overall: 125 TSV files

each line in a TSV file represents an n-gram using the following
columns:
- `ngram_type`: 1, 2, or 3
- `count`: frequency, that is, number of times it appears in that
  month
- `ngram`: the n-gram itself
