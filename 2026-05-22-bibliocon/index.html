# Lösungsansätze

--
Bild: Stand-Off-Annotationen


<small>

Burghardt, M., & Wolff, C. (2009). [Stand Off-Annotation für
Textdokumente: Vom Konzept zur Implementierung (zur
Standardisierung?)](https://epub.uni-regensburg.de/14223/1/Stand-off-AnnotationGSCL2009.pdf). In
*Proceedings of the Biennial GSCL Conference* (pp. 53-59).

</small>

Notes:
- Idee von Stand-Off-Annotationen erklären
- da etwa die Verwendung von Stand-Off-Annotationen einige Expertise
  benötigt und je nach Art der Daten nur mit statistischen Verfahren
  und damit verbundenen Ungenauigkeiten umsetzbar ist.

--

![Corpus Masking](images/corpus_masking.png)

<small>

Rehm, G., Witt, A., Zinsmeister, H. & Dellert, J. (2007). [Corpus
masking: Legally bypassing licensing restrictions for the free
distribution of text
collections](https://nbn-resolving.org/urn:nbn:de:bsz:mh39-45145). *Digital
Humanities 2007*. Conference Abstracts (pp. 166-170).

</small>

Notes:
